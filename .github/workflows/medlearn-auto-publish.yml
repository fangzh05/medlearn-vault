name: MedLearn Auto Publish

on:
  workflow_call:
    inputs:
      source_job_id:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      source_job_id:
        description: Existing control-plane Job identifier
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: medlearn-auto-publish-${{ inputs.source_job_id }}
  cancel-in-progress: false

jobs:
  auto-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Auto-approve and publish eligible Job
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          VAULT_R2_ENDPOINT: ${{ secrets.VAULT_R2_ENDPOINT }}
          VAULT_R2_ACCESS_KEY_ID: ${{ secrets.VAULT_R2_ACCESS_KEY_ID }}
          VAULT_R2_SECRET_ACCESS_KEY: ${{ secrets.VAULT_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_PROPOSE_BUNDLE_PATH: ${{ vars.MEDLEARN_PROPOSE_BUNDLE_PATH }}
          MEDLEARN_SOURCE_JOB_ID: ${{ inputs.source_job_id }}
        run: |
          result=$(medlearn workflow auto-publish "$MEDLEARN_SOURCE_JOB_ID" --json)
          printf '%s\n' "$result" >> "$GITHUB_STEP_SUMMARY"

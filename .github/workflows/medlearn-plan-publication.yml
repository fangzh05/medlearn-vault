name: MedLearn Plan Publication

on:
  workflow_dispatch:
    inputs:
      approval_id: {required: true, type: string}
      approval_object_digest: {required: true, type: string}
      source_job_id: {required: true, type: string}
      proposal_id: {required: true, type: string}
      proposal_object_digest: {required: true, type: string}
      expected_base_bundle_digest: {required: true, type: string}
      confirmation: {required: true, type: string}

permissions:
  contents: read

concurrency:
  group: medlearn-plan-publication-${{ inputs.approval_id }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Validate publication confirmation
        env:
          MEDLEARN_APPROVAL_ID: ${{ inputs.approval_id }}
          MEDLEARN_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [[ "$MEDLEARN_CONFIRMATION" != "$MEDLEARN_APPROVAL_ID" ]]; then
            echo "error_code=PUBLICATION_CONFIRMATION_MISMATCH" >&2
            exit 1
          fi
      - name: Build or reuse publication plan
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_PROPOSE_BUNDLE_PATH: ${{ vars.MEDLEARN_PROPOSE_BUNDLE_PATH }}
          MEDLEARN_APPROVAL_ID: ${{ inputs.approval_id }}
          MEDLEARN_APPROVAL_OBJECT_DIGEST: ${{ inputs.approval_object_digest }}
          MEDLEARN_SOURCE_JOB_ID: ${{ inputs.source_job_id }}
          MEDLEARN_PROPOSAL_ID: ${{ inputs.proposal_id }}
          MEDLEARN_PROPOSAL_OBJECT_DIGEST: ${{ inputs.proposal_object_digest }}
          MEDLEARN_EXPECTED_BASE_BUNDLE_DIGEST: ${{ inputs.expected_base_bundle_digest }}
        run: >-
          medlearn workflow plan-publication "$MEDLEARN_APPROVAL_ID"
          "$MEDLEARN_APPROVAL_OBJECT_DIGEST" "$MEDLEARN_SOURCE_JOB_ID"
          "$MEDLEARN_PROPOSAL_ID" "$MEDLEARN_PROPOSAL_OBJECT_DIGEST"
          "$MEDLEARN_EXPECTED_BASE_BUNDLE_DIGEST"

name: MedLearn Verify Approval

on:
  workflow_dispatch:
    inputs:
      approval_id:
        description: Fixed control-plane approval identifier
        required: true
        type: string
      source_job_id:
        description: Verified source proposal job identifier
        required: true
        type: string
      proposal_id:
        description: Fixed control-plane proposal identifier
        required: true
        type: string
      expected_proposal_object_digest:
        description: SHA-256 digest of exact stored Proposal bytes
        required: true
        type: string
      expected_base_bundle_digest:
        description: SHA-256 digest of the Proposal base bundle
        required: true
        type: string
      expected_decision:
        description: Expected immutable approval decision
        required: true
        type: choice
        options: [approved, rejected]
        default: approved
      expected_rejection_code:
        description: Expected uppercase rejection code for rejected decisions
        required: false
        type: string
        default: ""
      expected_approval_object_digest:
        description: Optional SHA-256 digest of exact stored Approval bytes
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: medlearn-verify-approval-${{ inputs.approval_id }}
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Verify existing approval
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_APPROVAL_ID: ${{ inputs.approval_id }}
          MEDLEARN_SOURCE_JOB_ID: ${{ inputs.source_job_id }}
          MEDLEARN_PROPOSAL_ID: ${{ inputs.proposal_id }}
          MEDLEARN_EXPECTED_PROPOSAL_OBJECT_DIGEST: ${{ inputs.expected_proposal_object_digest }}
          MEDLEARN_EXPECTED_BASE_BUNDLE_DIGEST: ${{ inputs.expected_base_bundle_digest }}
          MEDLEARN_EXPECTED_DECISION: ${{ inputs.expected_decision }}
          MEDLEARN_EXPECTED_REJECTION_CODE: ${{ inputs.expected_rejection_code }}
          MEDLEARN_EXPECTED_APPROVAL_OBJECT_DIGEST: ${{ inputs.expected_approval_object_digest }}
        run: |
          args=(
            workflow verify-approval
            "$MEDLEARN_APPROVAL_ID"
            "$MEDLEARN_SOURCE_JOB_ID"
            "$MEDLEARN_PROPOSAL_ID"
            "$MEDLEARN_EXPECTED_PROPOSAL_OBJECT_DIGEST"
            "$MEDLEARN_EXPECTED_BASE_BUNDLE_DIGEST"
            --expected-decision "$MEDLEARN_EXPECTED_DECISION"
          )
          if [[ -n "$MEDLEARN_EXPECTED_REJECTION_CODE" ]]; then
            args+=(--expected-rejection-code "$MEDLEARN_EXPECTED_REJECTION_CODE")
          fi
          if [[ -n "$MEDLEARN_EXPECTED_APPROVAL_OBJECT_DIGEST" ]]; then
            args+=(--expected-approval-object-digest "$MEDLEARN_EXPECTED_APPROVAL_OBJECT_DIGEST")
          fi
          medlearn "${args[@]}"

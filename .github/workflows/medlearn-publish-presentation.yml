name: MedLearn Publish Presentation

on:
  workflow_dispatch:
    inputs:
      bundle_path: {required: true, default: examples/copd, type: string}
      confirmation: {required: true, type: string}

permissions:
  contents: read

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: {persist-credentials: false, ref: main}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with: {python-version: "3.12"}
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Publish complete presentation generation
        env:
          VAULT_R2_ENDPOINT: ${{ secrets.VAULT_R2_ENDPOINT }}
          VAULT_R2_ACCESS_KEY_ID: ${{ secrets.VAULT_R2_ACCESS_KEY_ID }}
          VAULT_R2_SECRET_ACCESS_KEY: ${{ secrets.VAULT_R2_SECRET_ACCESS_KEY }}
          BUNDLE_PATH: ${{ inputs.bundle_path }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "$CONFIRMATION" = "publish-presentation"
          medlearn workflow publish-presentation "$BUNDLE_PATH"

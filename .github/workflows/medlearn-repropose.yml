name: MedLearn Reproposal

on:
  workflow_dispatch:
    inputs:
      source_job_id:
        description: Terminal blocked source Job ID
        required: true
        type: string
      blocked_proposal_id:
        description: Blocked Proposal ID from the source Job
        required: true
        type: string
      catalog_update_id:
        description: Merged catalog-update identity
        required: true
        type: string
      previous_base_bundle_digest:
        description: Base bundle digest of the blocked Proposal
        required: true
        type: string
      confirmation:
        description: Exact blocked Proposal ID to confirm
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: medlearn-repropose-${{ inputs.source_job_id }}-${{ inputs.catalog_update_id }}
  cancel-in-progress: false

jobs:
  repropose:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Create reproposal from blocked Job
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_PROPOSE_BUNDLE_PATH: ${{ vars.MEDLEARN_PROPOSE_BUNDLE_PATH }}
        run: >-
          medlearn workflow repropose
          "${{ inputs.source_job_id }}"
          "${{ inputs.blocked_proposal_id }}"
          "${{ inputs.catalog_update_id }}"
          "${{ inputs.previous_base_bundle_digest }}"
          "${{ inputs.confirmation }}"

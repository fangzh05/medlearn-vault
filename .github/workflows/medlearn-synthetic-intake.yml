name: MedLearn Synthetic Intake

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: medlearn-synthetic-intake
  cancel-in-progress: false

jobs:
  intake:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Submit synthetic intake
        id: intake
        env:
          MEDLEARN_INGEST_TOKEN: ${{ secrets.MEDLEARN_INGEST_TOKEN }}
          MEDLEARN_INGEST_URL: ${{ vars.MEDLEARN_INGEST_URL }}
          MEDLEARN_RUN_ID: ${{ github.run_id }}
          MEDLEARN_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if [[ ! "$MEDLEARN_INGEST_URL" =~ ^https://[A-Za-z0-9.-]+(:[0-9]{1,5})?/v1/captures$ ]]; then
            echo "error_code=INVALID_SYNTHETIC_CONFIGURATION" >&2
            exit 1
          fi
          if [[ ${#MEDLEARN_INGEST_TOKEN} -lt 32 ]]; then
            echo "error_code=INVALID_SYNTHETIC_CONFIGURATION" >&2
            exit 1
          fi
          payload="$RUNNER_TEMP/synthetic-intake.json"
          response="$RUNNER_TEMP/synthetic-intake-response.json"
          jq --arg session_id "session:synthetic-${MEDLEARN_RUN_ID}-${MEDLEARN_RUN_ATTEMPT}" \
            '.draft.context.session_id = $session_id' \
            examples/intake/synthetic-e2e.json > "$payload"
          status=$(curl --silent --show-error --output "$response" --write-out "%{http_code}" \
            --request POST "$MEDLEARN_INGEST_URL" \
            --header "Authorization: Bearer $MEDLEARN_INGEST_TOKEN" \
            --header "Content-Type: application/json" \
            --header "Idempotency-Key: synthetic-${MEDLEARN_RUN_ID}-${MEDLEARN_RUN_ATTEMPT}" \
            --data-binary "@$payload")
          if [[ "$status" != "202" ]]; then
            echo "error_code=SYNTHETIC_INTAKE_FAILED" >&2
            exit 1
          fi
          job_id=$(jq -r '.job_id // empty' "$response")
          if [[ ! "$job_id" =~ ^[A-Za-z0-9][A-Za-z0-9_-]{0,127}$ ]]; then
            echo "error_code=INVALID_SYNTHETIC_RESPONSE" >&2
            exit 1
          fi
          job_url="${MEDLEARN_INGEST_URL%/v1/captures}/v1/jobs/${job_id}"
          completed=false
          for _ in {1..60}; do
            status=$(curl --silent --show-error --output "$response" --write-out "%{http_code}" \
              --request GET "$job_url" \
              --header "Authorization: Bearer $MEDLEARN_INGEST_TOKEN")
            if [[ "$status" == "200" ]]; then
              job_status=$(jq -r '.status // empty' "$response")
              if [[ "$job_status" == "succeeded" ]]; then
                completed=true
                break
              fi
              if [[ "$job_status" =~ ^(blocked|failed|expired)$ ]]; then
                echo "error_code=SYNTHETIC_PROPOSAL_FAILED" >&2
                exit 1
              fi
            fi
            sleep 5
          done
          if [[ "$completed" != "true" ]]; then
            echo "error_code=SYNTHETIC_PROPOSAL_TIMEOUT" >&2
            exit 1
          fi
          printf 'source_job_id=%s\n' "$job_id" >> "$GITHUB_OUTPUT"
          printf 'status=ready source_job_id=%s\n' "$job_id"
      - name: Inspect synthetic proposal
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_SOURCE_JOB_ID: ${{ steps.intake.outputs.source_job_id }}
        run: medlearn workflow inspect-proposal "$MEDLEARN_SOURCE_JOB_ID"

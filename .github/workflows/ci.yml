name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - run: python -m pip install --require-hashes -r requirements/ci.txt
      - run: python -m pip install --no-build-isolation --no-deps .
      - run: python -m ruff check .
      - run: python -m mypy src
      - run: python -m pytest -q
      - run: medlearn schema check
      - run: medlearn bundle validate examples/gerd
      - run: medlearn bundle validate examples/copd
      - run: python -m pip check
      - name: Wheel build and install smoke test
        run: |
          python -m pip wheel --no-build-isolation --no-deps --wheel-dir wheelhouse .
          python -m pip install --force-reinstall --no-deps wheelhouse/*.whl
      - run: medlearn --help
      - run: medlearn doctor
  worker-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run contracts:check
      - run: npx --no-install wrangler deploy --dry-run
  windows-sync-quality:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - run: python -m pip install --require-hashes -r requirements/ci.txt
      - run: python -m pip install --no-build-isolation --no-deps .
      - run: python -m pytest -q tests/test_sync_client.py tests/test_sync_cli.py tests/test_windows_secrets.py tests/test_windows_rollout.py
      - run: python -m pytest -q
      - run: python -m pip wheel --require-hashes -r requirements/ci.txt --wheel-dir wheelhouse
      - run: python -m pip wheel --no-build-isolation --no-deps --wheel-dir wheelhouse .
      - name: Isolated Windows self-upgrade bootstrap acceptance
        shell: pwsh
        run: |
          $headWheel = Get-ChildItem wheelhouse\medlearn_vault-0.16.1-*.whl | Select-Object -First 1
          if ($null -eq $headWheel) { throw "head wheel not found" }
          $base = Join-Path $env:RUNNER_TEMP 'medlearn base A'
          $archive = Join-Path $env:RUNNER_TEMP 'medlearn-base.zip'
          $installRoot = Join-Path $env:RUNNER_TEMP "medlearn sync ç”¨æˆ·"
          $home = Join-Path $env:RUNNER_TEMP 'medlearn external state'
          git archive --format=zip HEAD -o $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $base -Force
          (Get-Content -Raw "$base\pyproject.toml").Replace('0.16.1', '0.16.0') | Set-Content -NoNewline "$base\pyproject.toml"
          (Get-Content -Raw "$base\src\medlearn_vault\__init__.py").Replace('0.16.1', '0.16.0') | Set-Content -NoNewline "$base\src\medlearn_vault\__init__.py"
          python -m pip wheel --no-build-isolation --no-deps --wheel-dir wheelhouse $base
          $baseWheel = Get-ChildItem wheelhouse\medlearn_vault-0.16.0-*.whl | Select-Object -First 1
          if ($null -eq $baseWheel) { throw "base wheel not found" }
          New-Item -ItemType Directory -Force $home | Out-Null
          Set-Content -NoNewline (Join-Path $home 'config.json') 'sentinel-config'
          Set-Content -NoNewline (Join-Path $home 'state.json') 'sentinel-state'
          Set-Content -NoNewline (Join-Path $home 'credential.dpapi') 'sentinel-credential'
          $sentinels = Get-ChildItem $home -File | Get-FileHash | ForEach-Object { "$($_.Path):$($_.Hash)" }
          $installRoot = Join-Path $env:RUNNER_TEMP "medlearn sync ç”¨æˆ·"
          $env:MEDLEARN_SYNC_INSTALL_ROOT = $installRoot
          $env:MEDLEARN_HOME = $home
          $previousPythonIoEncoding = $env:PYTHONIOENCODING
          $env:PYTHONIOENCODING = 'cp1252:strict'
          $stderrPath = Join-Path $env:RUNNER_TEMP 'medlearn-sync-installer.stderr'
          try {
            $bootstrap = Join-Path $PWD 'scripts\install_windows_client.ps1'
            $rawText = (& $bootstrap -Wheel $baseWheel.FullName -InstallRoot $installRoot -Json 2> $stderrPath | Out-String).Trim()
            if ($LASTEXITCODE -ne 0) { throw "base bootstrap failed" }
            $rawText | ConvertFrom-Json | Out-Null
            $installed = Join-Path $installRoot 'venv\Scripts\medlearn.exe'
            $baseVersion = (& $installed --version | Out-String).Trim()
            if ($baseVersion -ne '0.16.0') { throw 'base version mismatch' }
            $selfUpgrade = (& $installed sync install-windows --wheel $headWheel.FullName --json 2>&1 | Out-String).Trim()
            if ($LASTEXITCODE -eq 0 -or ($selfUpgrade | ConvertFrom-Json).error_code -ne 'SYNC_INSTALL_SELF_UPGRADE_REQUIRES_BOOTSTRAP') { throw 'self-hosted guard failed' }
            & $installed --help | Out-Null
            $rawText = (& $bootstrap -Wheel $headWheel.FullName -InstallRoot $installRoot -Json 2> $stderrPath | Out-String).Trim()
            if ($LASTEXITCODE -ne 0) { throw "head bootstrap failed" }
            $installedResult = $rawText | ConvertFrom-Json
            if ($rawText.ToCharArray() | Where-Object { [int][char]$_ -gt 127 }) { throw "installer JSON output was not ASCII-safe" }
            if ((Get-Content -Raw $stderrPath -ErrorAction SilentlyContinue) -match 'Traceback') { throw "installer wrote a traceback to stderr" }
            $headVersion = (& $installed --version | Out-String).Trim()
            if ($headVersion -ne '0.16.1') { throw 'head version mismatch' }
            & $installed --help | Out-Null
            & $installed doctor | Out-Null
            & (Join-Path $installRoot 'venv\Scripts\python.exe') -m pip check
            if (Get-ChildItem $installRoot -Directory -Filter '.venv-*' -ErrorAction SilentlyContinue) { throw 'installer leftovers found' }
            $after = Get-ChildItem $home -File | Get-FileHash | ForEach-Object { "$($_.Path):$($_.Hash)" }
            if (Compare-Object $sentinels $after) { throw 'external state changed' }
            $rerunRaw = (& $bootstrap -Wheel $headWheel.FullName -InstallRoot $installRoot -Json 2> $stderrPath | Out-String).Trim()
            $rerun = $rerunRaw | ConvertFrom-Json
            if ($rerun.status -ne 'reused') { throw 'bootstrap rerun was not idempotent' }
          } finally {
            Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $stderrPath -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $base -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $archive -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $home -Recurse -Force -ErrorAction SilentlyContinue
            if ($null -eq $previousPythonIoEncoding) {
              Remove-Item Env:PYTHONIOENCODING -ErrorAction SilentlyContinue
            } else {
              $env:PYTHONIOENCODING = $previousPythonIoEncoding
            }
          }
      - name: Sync status smoke test
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "medlearn-sync-vault"
          $env:MEDLEARN_HOME = Join-Path $env:RUNNER_TEMP "medlearn-sync-home"
          New-Item -ItemType Directory -Force (Join-Path $vault ".obsidian") | Out-Null
          medlearn sync configure --endpoint "https://example.invalid" --vault $vault
          medlearn sync status --json
          medlearn sync schedule install --what-if --json

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - run: python -m pip install --require-hashes -r requirements/ci.txt
      - run: python -m pip install --no-build-isolation --no-deps .
      - run: python -m ruff check .
      - run: python -m mypy src
      - run: python -m pytest -q
      - run: medlearn schema check
      - run: medlearn bundle validate examples/gerd
      - run: medlearn bundle validate examples/copd
      - run: python -m pip check
      - name: Wheel build and install smoke test
        run: |
          python -m pip wheel --no-build-isolation --no-deps --wheel-dir wheelhouse .
          python -m pip install --force-reinstall --no-deps wheelhouse/*.whl
      - run: medlearn --help
      - run: medlearn doctor
  worker-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run contracts:check
      - run: npx --no-install wrangler deploy --dry-run
  windows-sync-quality:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - run: python -m pip install --require-hashes -r requirements/ci.txt
      - run: python -m pip install --no-build-isolation --no-deps .
      - run: python -m pytest -q tests/test_sync_client.py tests/test_sync_cli.py tests/test_windows_secrets.py
      - run: python -m pytest -q
      - run: python -m pip wheel --no-build-isolation --no-deps --wheel-dir wheelhouse .
      - name: Wheel install and CLI smoke test
        shell: pwsh
        run: |
          $wheel = Get-ChildItem wheelhouse\*.whl | Select-Object -First 1
          if ($null -eq $wheel) { throw "wheel not found" }
          python -m pip install --force-reinstall --no-deps $wheel.FullName
          medlearn --version
          medlearn sync --help
      - name: Sync status smoke test
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "medlearn-sync-vault"
          $env:MEDLEARN_HOME = Join-Path $env:RUNNER_TEMP "medlearn-sync-home"
          New-Item -ItemType Directory -Force (Join-Path $vault ".obsidian") | Out-Null
          medlearn sync configure --endpoint "https://example.invalid" --vault $vault
          medlearn sync status --json

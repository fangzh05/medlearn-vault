name: MedLearn Propose

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Fixed control-plane job identifier
        required: true
        type: string
      intake_object_key:
        description: Content-addressed control intake object
        required: true
        type: string
      intake_digest:
        description: SHA-256 digest of exact IntakeEnvelope bytes
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    env:
      CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
      CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
      CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
      MEDLEARN_PROPOSE_BUNDLE_PATH: ${{ vars.MEDLEARN_PROPOSE_BUNDLE_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -c constraints.txt .
      - name: Build or verify proposal
        env:
          MEDLEARN_JOB_ID: ${{ inputs.job_id }}
          MEDLEARN_INTAKE_OBJECT_KEY: ${{ inputs.intake_object_key }}
          MEDLEARN_INTAKE_DIGEST: ${{ inputs.intake_digest }}
        run: >-
          medlearn workflow propose "$MEDLEARN_JOB_ID"
          "$MEDLEARN_INTAKE_OBJECT_KEY" "$MEDLEARN_INTAKE_DIGEST"

name: MedLearn Publish Vault

on:
  workflow_dispatch:
    inputs:
      publication_plan_id: {required: true, type: string}
      publication_plan_object_digest: {required: true, type: string}
      source_job_id: {required: true, type: string}
      confirmation: {required: true, type: string}

permissions:
  contents: read

concurrency:
  group: medlearn-publish-vault-${{ inputs.publication_plan_id }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Validate publish-vault confirmation
        env:
          MEDLEARN_PLAN_ID: ${{ inputs.publication_plan_id }}
          MEDLEARN_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [[ "$MEDLEARN_CONFIRMATION" != "$MEDLEARN_PLAN_ID" ]]; then
            echo "error_code=PUBLISH_VAULT_CONFIRMATION_MISMATCH" >&2
            exit 1
          fi
      - name: Publish planned artifacts to medlearn-vault
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          VAULT_R2_ENDPOINT: ${{ secrets.VAULT_R2_ENDPOINT }}
          VAULT_R2_ACCESS_KEY_ID: ${{ secrets.VAULT_R2_ACCESS_KEY_ID }}
          VAULT_R2_SECRET_ACCESS_KEY: ${{ secrets.VAULT_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_PLAN_ID: ${{ inputs.publication_plan_id }}
          MEDLEARN_PLAN_DIGEST: ${{ inputs.publication_plan_object_digest }}
          MEDLEARN_SOURCE_JOB_ID: ${{ inputs.source_job_id }}
        run: >-
          medlearn workflow publish-vault "$MEDLEARN_PLAN_ID"
          "$MEDLEARN_PLAN_DIGEST" "$MEDLEARN_SOURCE_JOB_ID"

name: MedLearn Export Proposal

on:
  workflow_dispatch:
    inputs:
      source_job_id:
        description: Terminal source Job ID
        required: true
        type: string
      proposal_id:
        description: Exact Proposal ID to export
        required: true
        type: string
      confirmation:
        description: Repeat the exact Proposal ID
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: medlearn-export-proposal-${{ inputs.source_job_id }}-${{ inputs.proposal_id }}
  cancel-in-progress: false

jobs:
  export:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate export confirmation
        env:
          MEDLEARN_PROPOSAL_ID: ${{ inputs.proposal_id }}
          MEDLEARN_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$MEDLEARN_PROPOSAL_ID" != "$MEDLEARN_CONFIRMATION" ]; then
            echo "error_code=PROPOSAL_EXPORT_CONFIRMATION_MISMATCH" >&2
            exit 1
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Export exact Proposal and catalog update
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_SOURCE_JOB_ID: ${{ inputs.source_job_id }}
          MEDLEARN_PROPOSAL_ID: ${{ inputs.proposal_id }}
          MEDLEARN_PROPOSE_BUNDLE_PATH: ${{ vars.MEDLEARN_PROPOSE_BUNDLE_PATH }}
        run: |
          out="$RUNNER_TEMP/medlearn-proposal-export"
          mkdir -p "$out"
          medlearn workflow export-proposal "$MEDLEARN_SOURCE_JOB_ID" "$MEDLEARN_PROPOSAL_ID" --output "$out"
          medlearn capture catalog-update \
            "$out/proposal.json" \
            "$out/catalog-update.json" \
            "$out/catalog-update-review.md" \
            --bundle "$MEDLEARN_PROPOSE_BUNDLE_PATH" || status=$?
          if [ "${status:-0}" -ne 1 ] && [ "${status:-0}" -ne 0 ]; then
            exit "$status"
          fi
          printf 'artifact_dir=%s\n' "$out"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: medlearn-proposal-export-${{ inputs.proposal_id }}
          path: ${{ runner.temp }}/medlearn-proposal-export
          if-no-files-found: error

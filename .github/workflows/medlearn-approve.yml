name: MedLearn Approve

on:
  workflow_dispatch:
    inputs:
      proposal_id:
        description: Fixed control-plane proposal identifier
        required: true
        type: string
      proposal_object_digest:
        description: SHA-256 digest of exact stored Proposal bytes
        required: true
        type: string
      expected_base_bundle_digest:
        description: SHA-256 digest of the Proposal base bundle
        required: true
        type: string
      confirmation:
        description: Exact proposal identifier confirmation
        required: true
        type: string
      decision:
        description: Immutable decision for this Proposal
        required: true
        type: choice
        options: [select_decision, approved, rejected]
        default: select_decision
      rejection_code:
        description: Required uppercase code when decision is rejected
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: medlearn-approve-${{ inputs.proposal_id }}
  cancel-in-progress: false

jobs:
  approve:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements/workflow.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Validate approval confirmation
        env:
          MEDLEARN_PROPOSAL_ID: ${{ inputs.proposal_id }}
          MEDLEARN_CONFIRMATION: ${{ inputs.confirmation }}
          MEDLEARN_DECISION: ${{ inputs.decision }}
        run: |
          if [[ "$MEDLEARN_DECISION" != "approved" && "$MEDLEARN_DECISION" != "rejected" ]]; then
            echo "error_code=APPROVAL_DECISION_REQUIRED" >&2
            exit 1
          fi
          if [[ "$MEDLEARN_CONFIRMATION" != "$MEDLEARN_PROPOSAL_ID" ]]; then
            echo "error_code=APPROVAL_CONFIRMATION_MISMATCH" >&2
            exit 1
          fi
      - name: Validate and record approval
        env:
          CONTROL_R2_ENDPOINT: ${{ secrets.CONTROL_R2_ENDPOINT }}
          CONTROL_R2_ACCESS_KEY_ID: ${{ secrets.CONTROL_R2_ACCESS_KEY_ID }}
          CONTROL_R2_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_R2_SECRET_ACCESS_KEY }}
          MEDLEARN_PROPOSAL_ID: ${{ inputs.proposal_id }}
          MEDLEARN_PROPOSAL_OBJECT_DIGEST: ${{ inputs.proposal_object_digest }}
          MEDLEARN_EXPECTED_BASE_BUNDLE_DIGEST: ${{ inputs.expected_base_bundle_digest }}
          MEDLEARN_DECISION: ${{ inputs.decision }}
          MEDLEARN_REJECTION_CODE: ${{ inputs.rejection_code }}
        run: |
          args=(
            workflow approve
            "$MEDLEARN_PROPOSAL_ID"
            "$MEDLEARN_PROPOSAL_OBJECT_DIGEST"
            "$MEDLEARN_EXPECTED_BASE_BUNDLE_DIGEST"
            --decision "$MEDLEARN_DECISION"
          )
          if [[ -n "$MEDLEARN_REJECTION_CODE" ]]; then
            args+=(--rejection-code "$MEDLEARN_REJECTION_CODE")
          fi
          medlearn "${args[@]}"
